<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>素材风格 A - Kung Fu Master (Canvas硬编码)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D0208;
      color: #00FF41;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 1.2rem;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00FF41;
    }

    .source-info {
      font-size: 0.75rem;
      color: #008F11;
      margin-bottom: 20px;
      text-align: center;
    }

    .source-info a { color: #00FF41; }

    .canvas-container {
      background: #000;
      border: 2px solid #00FF41;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
    }

    canvas {
      display: block;
      background: #000;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 15px;
    }

    .btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid #00FF41;
      color: #00FF41;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .btn:hover { background: rgba(0, 255, 65, 0.2); }
    .btn.active {
      background: #00FF41;
      color: #000;
    }

    .features {
      max-width: 400px;
      font-size: 0.7rem;
      color: #888;
      line-height: 1.6;
    }

    .features h3 {
      color: #00FF41;
      margin: 15px 0 8px;
      font-size: 0.8rem;
    }

    .features ul { padding-left: 20px; }
    .features li { margin: 3px 0; }
    .features .pro { color: #4ADE80; }
    .features .con { color: #F87171; }
  </style>
</head>
<body>
  <h1>素材风格 A: Kung Fu Master</h1>
  <div class="source-info">
    原始素材: <a href="https://opengameart.org/content/2d-kung-fu-master" target="_blank">OpenGameArt 2D Kung Fu Master</a><br>
    授权: GPL 2.0 | 实现方式: Canvas 2D 硬编码
  </div>

  <div class="canvas-container">
    <canvas id="canvas" width="200" height="200"></canvas>
  </div>

  <div class="controls">
    <button class="btn active" data-action="idle">Idle 待机</button>
    <button class="btn" data-action="punch">Punch 出拳</button>
    <button class="btn" data-action="kick">Kick 踢腿</button>
    <button class="btn" data-action="jump">Jump 跳跃</button>
    <button class="btn" data-action="run">Run 奔跑</button>
    <button class="btn" data-action="die">Die 倒下</button>
  </div>

  <div class="features">
    <h3>技术特点</h3>
    <ul>
      <li class="pro">✓ 包体积极小 (&lt;5KB)</li>
      <li class="pro">✓ 完全可编程控制</li>
      <li class="pro">✓ 动态颜色修改</li>
      <li class="pro">✓ 无需外部资源</li>
      <li class="pro">✓ 符合 Matrix "代码即画面" 美学</li>
      <li class="con">✗ 需要手写帧数据</li>
      <li class="con">✗ 复杂动画维护成本高</li>
    </ul>

    <h3>适用场景</h3>
    <ul>
      <li>简单像素风格，帧数少(2-4帧/动作)</li>
      <li>需要100%代码控制</li>
      <li>追求极致性能和包大小</li>
    </ul>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const PS = 6; // 像素大小
    const COLOR = '#00FF41';

    // Kung Fu Master 风格帧数据 - 更精细的像素小人
    const FRAMES = {
      idle: [
        // 帧1: 直立呼吸
        [[7,1],[6,2],[7,2],[8,2],[5,3],[6,3],[7,3],[8,3],[9,3],[5,4],[9,4],[4,5],[5,5],[9,5],[10,5],[5,6],[9,6],[5,7],[6,7],[8,7],[9,7],[5,8],[9,8],[4,9],[5,9],[9,9],[10,9]],
        // 帧2: 轻微起伏
        [[7,0],[6,1],[7,1],[8,1],[5,2],[6,2],[7,2],[8,2],[9,2],[5,3],[9,3],[4,4],[5,4],[9,4],[10,4],[5,5],[9,5],[5,6],[6,6],[8,6],[9,6],[5,7],[9,7],[4,8],[5,8],[9,8],[10,8]]
      ],
      punch: [
        // 帧1: 准备
        [[7,1],[6,2],[7,2],[8,2],[5,3],[6,3],[7,3],[8,3],[9,3],[5,4],[9,4],[4,5],[5,5],[9,5],[10,5],[5,6],[9,6],[5,7],[6,7],[8,7],[9,7],[5,8],[9,8],[4,9],[5,9],[9,9],[10,9]],
        // 帧2: 出拳
        [[7,1],[6,2],[7,2],[8,2],[5,3],[6,3],[7,3],[8,3],[9,3],[5,4],[9,4],[4,5],[5,5],[9,5],[10,5],[11,5],[12,5],[13,5],[14,5],[5,6],[9,6],[5,7],[6,7],[8,7],[9,7],[5,8],[9,8],[4,9],[5,9],[9,9],[10,9]],
        // 帧3: 收拳
        [[7,1],[6,2],[7,2],[8,2],[5,3],[6,3],[7,3],[8,3],[9,3],[5,4],[9,4],[4,5],[5,5],[9,5],[10,5],[5,6],[9,6],[5,7],[6,7],[8,7],[9,7],[5,8],[9,8],[4,9],[5,9],[9,9],[10,9]]
      ],
      kick: [
        // 帧1: 准备
        [[7,1],[6,2],[7,2],[8,2],[5,3],[6,3],[7,3],[8,3],[9,3],[5,4],[9,4],[4,5],[5,5],[9,5],[10,5],[5,6],[9,6],[5,7],[6,7],[8,7],[9,7],[5,8],[9,8],[4,9],[5,9],[9,9],[10,9]],
        // 帧2: 踢出
        [[7,1],[6,2],[7,2],[8,2],[5,3],[6,3],[7,3],[8,3],[9,3],[5,4],[9,4],[4,5],[5,5],[9,5],[10,5],[5,6],[9,6],[4,7],[5,7],[8,7],[9,7],[10,7],[11,7],[12,7],[13,7],[5,8],[5,9],[5,10]],
        // 帧3: 收腿
        [[7,1],[6,2],[7,2],[8,2],[5,3],[6,3],[7,3],[8,3],[9,3],[5,4],[9,4],[4,5],[5,5],[9,5],[10,5],[5,6],[9,6],[5,7],[6,7],[8,7],[9,7],[5,8],[9,8],[4,9],[5,9],[9,9],[10,9]]
      ],
      jump: [
        // 帧1: 起跳
        [[7,2],[6,3],[7,3],[8,3],[5,4],[6,4],[7,4],[8,4],[9,4],[5,5],[9,5],[4,6],[5,6],[9,6],[10,6],[5,7],[9,7],[4,8],[5,8],[9,8],[10,8],[3,9],[4,9],[10,9],[11,9]],
        // 帧2: 空中
        [[7,0],[6,1],[7,1],[8,1],[5,2],[6,2],[7,2],[8,2],[9,2],[5,3],[9,3],[4,4],[5,4],[9,4],[10,4],[5,5],[9,5],[5,6],[6,6],[8,6],[9,6],[5,7],[6,7],[8,7],[9,7]],
        // 帧3: 下落
        [[7,1],[6,2],[7,2],[8,2],[5,3],[6,3],[7,3],[8,3],[9,3],[5,4],[9,4],[4,5],[5,5],[9,5],[10,5],[5,6],[9,6],[5,7],[6,7],[8,7],[9,7],[5,8],[9,8],[4,9],[5,9],[9,9],[10,9]]
      ],
      run: [
        // 帧1: 左腿前
        [[7,1],[6,2],[7,2],[8,2],[5,3],[6,3],[7,3],[8,3],[9,3],[5,4],[9,4],[4,5],[5,5],[9,5],[10,5],[5,6],[9,6],[3,7],[4,7],[9,7],[10,7],[11,7],[4,8],[5,8],[9,8],[10,9]],
        // 帧2: 双腿并拢
        [[6,1],[5,2],[6,2],[7,2],[4,3],[5,3],[6,3],[7,3],[8,3],[4,4],[8,4],[3,5],[4,5],[8,5],[9,5],[4,6],[8,6],[4,7],[5,7],[7,7],[8,7],[4,8],[8,8],[3,9],[4,9],[8,9],[9,9]],
        // 帧3: 右腿前
        [[7,1],[6,2],[7,2],[8,2],[5,3],[6,3],[7,3],[8,3],[9,3],[5,4],[9,4],[4,5],[5,5],[9,5],[10,5],[5,6],[9,6],[5,7],[6,7],[8,7],[9,7],[10,7],[5,8],[6,8],[10,8],[11,8],[4,9],[10,9]]
      ],
      die: [
        // 帧1: 中招
        [[7,1],[6,2],[7,2],[8,2],[5,3],[6,3],[7,3],[8,3],[9,3],[5,4],[9,4],[4,5],[5,5],[9,5],[10,5],[5,6],[9,6],[5,7],[9,7],[5,8],[9,8]],
        // 帧2: 倒下
        [[9,4],[8,5],[9,5],[10,5],[7,6],[8,6],[9,6],[10,6],[11,6],[6,7],[7,7],[11,7],[12,7],[5,8],[6,8],[7,8],[11,8],[12,8],[13,8],[5,9],[6,9],[7,9],[8,9],[9,9],[10,9],[11,9]],
        // 帧3: 倒地
        [[5,9],[6,9],[7,9],[8,9],[9,9],[10,9],[11,9],[12,9],[13,9],[4,10],[5,10],[6,10],[7,10],[8,10],[9,10],[10,10],[11,10],[12,10],[13,10],[14,10]]
      ]
    };

    let currentAction = 'idle';
    let frameIndex = 0;
    let offsetX = 40;
    let offsetY = 30;

    function drawFrame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const pixels = FRAMES[currentAction][frameIndex % FRAMES[currentAction].length];
      ctx.fillStyle = COLOR;

      pixels.forEach(([x, y]) => {
        ctx.fillRect(offsetX + x * PS, offsetY + y * PS, PS, PS);
      });

      // 发光效果
      ctx.shadowColor = COLOR;
      ctx.shadowBlur = 5;
    }

    function animate() {
      drawFrame();
      frameIndex++;
      setTimeout(() => requestAnimationFrame(animate), 200);
    }

    // 按钮事件
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentAction = btn.dataset.action;
        frameIndex = 0;
      });
    });

    animate();
  </script>
</body>
</html>

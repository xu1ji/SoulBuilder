<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>素材风格 C - Kung Fu Man NES (CSS box-shadow)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D0208;
      color: #00FF41;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 1.2rem;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00FF41;
    }

    .source-info {
      font-size: 0.75rem;
      color: #008F11;
      margin-bottom: 20px;
      text-align: center;
    }

    .source-info a { color: #00FF41; }
    .badge {
      display: inline-block;
      background: #00FF41;
      color: #000;
      padding: 2px 6px;
      font-size: 0.65rem;
      border-radius: 2px;
      margin-left: 5px;
    }

    .demo-container {
      background: #000;
      border: 2px solid #00FF41;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* CSS box-shadow 像素绘制 */
    .pixel-fighter {
      width: 4px;
      height: 4px;
      background: #00FF41;
      position: relative;
      filter: drop-shadow(0 0 5px #00FF41);
    }

    /* === 帧定义 - 使用box-shadow绘制像素 === */

    /* Idle 帧1 - 正常站立 */
    .pixel-fighter.idle-f1 {
      box-shadow:
        /* 头部 4x4 */
        8px 0 0 #00FF41, 12px 0 0 #00FF41,
        4px 4px 0 #00FF41, 8px 4px 0 #00FF41, 12px 4px 0 #00FF41, 16px 4px 0 #00FF41,
        4px 8px 0 #00FF41, 8px 8px 0 #00FF41, 12px 8px 0 #00FF41, 16px 8px 0 #00FF41,
        8px 12px 0 #00FF41, 12px 12px 0 #00FF41,
        /* 身体 6x6 */
        0px 16px 0 #00FF41, 4px 16px 0 #00FF41, 8px 16px 0 #00FF41, 12px 16px 0 #00FF41, 16px 16px 0 #00FF41, 20px 16px 0 #00FF41,
        0px 20px 0 #00FF41, 4px 20px 0 #00FF41, 8px 20px 0 #00FF41, 12px 20px 0 #00FF41, 16px 20px 0 #00FF41, 20px 20px 0 #00FF41,
        4px 24px 0 #00FF41, 8px 24px 0 #00FF41, 12px 24px 0 #00FF41, 16px 24px 0 #00FF41,
        /* 手臂 */
        -8px 20px 0 #00FF41, -4px 20px 0 #00FF41,
        24px 20px 0 #00FF41, 28px 20px 0 #00FF41,
        /* 腿部 */
        4px 28px 0 #00FF41, 8px 28px 0 #00FF41,
        16px 28px 0 #00FF41, 20px 28px 0 #00FF41,
        4px 32px 0 #00FF41, 8px 32px 0 #00FF41,
        16px 32px 0 #00FF41, 20px 32px 0 #00FF41,
        4px 36px 0 #00FF41,
        20px 36px 0 #00FF41;
      animation: idle-anim 0.8s steps(1) infinite;
    }

    /* Idle 帧2 - 轻微移动 */
    .pixel-fighter.idle-f2 {
      box-shadow:
        /* 头部 */
        8px -4px 0 #00FF41, 12px -4px 0 #00FF41,
        4px 0px 0 #00FF41, 8px 0px 0 #00FF41, 12px 0px 0 #00FF41, 16px 0px 0 #00FF41,
        4px 4px 0 #00FF41, 8px 4px 0 #00FF41, 12px 4px 0 #00FF41, 16px 4px 0 #00FF41,
        8px 8px 0 #00FF41, 12px 8px 0 #00FF41,
        /* 身体 */
        0px 12px 0 #00FF41, 4px 12px 0 #00FF41, 8px 12px 0 #00FF41, 12px 12px 0 #00FF41, 16px 12px 0 #00FF41, 20px 12px 0 #00FF41,
        0px 16px 0 #00FF41, 4px 16px 0 #00FF41, 8px 16px 0 #00FF41, 12px 16px 0 #00FF41, 16px 16px 0 #00FF41, 20px 16px 0 #00FF41,
        4px 20px 0 #00FF41, 8px 20px 0 #00FF41, 12px 20px 0 #00FF41, 16px 20px 0 #00FF41,
        /* 手臂 */
        -8px 16px 0 #00FF41, -4px 16px 0 #00FF41,
        24px 16px 0 #00FF41, 28px 16px 0 #00FF41,
        /* 腿部 */
        8px 24px 0 #00FF41, 12px 24px 0 #00FF41,
        16px 24px 0 #00FF41, 20px 24px 0 #00FF41,
        8px 28px 0 #00FF41, 12px 28px 0 #00FF41,
        16px 28px 0 #00FF41, 20px 28px 0 #00FF41,
        8px 32px 0 #00FF41,
        20px 32px 0 #00FF41;
    }

    @keyframes idle-anim {
      0%, 100% { box-shadow:
        8px 0 0 #00FF41, 12px 0 0 #00FF41,
        4px 4px 0 #00FF41, 8px 4px 0 #00FF41, 12px 4px 0 #00FF41, 16px 4px 0 #00FF41,
        4px 8px 0 #00FF41, 8px 8px 0 #00FF41, 12px 8px 0 #00FF41, 16px 8px 0 #00FF41,
        8px 12px 0 #00FF41, 12px 12px 0 #00FF41,
        0px 16px 0 #00FF41, 4px 16px 0 #00FF41, 8px 16px 0 #00FF41, 12px 16px 0 #00FF41, 16px 16px 0 #00FF41, 20px 16px 0 #00FF41,
        0px 20px 0 #00FF41, 4px 20px 0 #00FF41, 8px 20px 0 #00FF41, 12px 20px 0 #00FF41, 16px 20px 0 #00FF41, 20px 20px 0 #00FF41,
        4px 24px 0 #00FF41, 8px 24px 0 #00FF41, 12px 24px 0 #00FF41, 16px 24px 0 #00FF41,
        -8px 20px 0 #00FF41, -4px 20px 0 #00FF41,
        24px 20px 0 #00FF41, 28px 20px 0 #00FF41,
        4px 28px 0 #00FF41, 8px 28px 0 #00FF41,
        16px 28px 0 #00FF41, 20px 28px 0 #00FF41,
        4px 32px 0 #00FF41, 8px 32px 0 #00FF41,
        16px 32px 0 #00FF41, 20px 32px 0 #00FF41,
        4px 36px 0 #00FF41, 20px 36px 0 #00FF41;
      }
      50% { box-shadow:
        8px -2px 0 #00FF41, 12px -2px 0 #00FF41,
        4px 2px 0 #00FF41, 8px 2px 0 #00FF41, 12px 2px 0 #00FF41, 16px 2px 0 #00FF41,
        4px 6px 0 #00FF41, 8px 6px 0 #00FF41, 12px 6px 0 #00FF41, 16px 6px 0 #00FF41,
        8px 10px 0 #00FF41, 12px 10px 0 #00FF41,
        0px 14px 0 #00FF41, 4px 14px 0 #00FF41, 8px 14px 0 #00FF41, 12px 14px 0 #00FF41, 16px 14px 0 #00FF41, 20px 14px 0 #00FF41,
        0px 18px 0 #00FF41, 4px 18px 0 #00FF41, 8px 18px 0 #00FF41, 12px 18px 0 #00FF41, 16px 18px 0 #00FF41, 20px 18px 0 #00FF41,
        4px 22px 0 #00FF41, 8px 22px 0 #00FF41, 12px 22px 0 #00FF41, 16px 22px 0 #00FF41,
        -8px 18px 0 #00FF41, -4px 18px 0 #00FF41,
        24px 18px 0 #00FF41, 28px 18px 0 #00FF41,
        4px 26px 0 #00FF41, 8px 26px 0 #00FF41,
        16px 26px 0 #00FF41, 20px 26px 0 #00FF41,
        4px 30px 0 #00FF41, 8px 30px 0 #00FF41,
        16px 30px 0 #00FF41, 20px 30px 0 #00FF41,
        4px 34px 0 #00FF41, 20px 34px 0 #00FF41;
      }
    }

    /* Punch 出拳 */
    .pixel-fighter.punch {
      animation: punch-anim 0.4s steps(1) infinite;
    }

    @keyframes punch-anim {
      0%, 100% { box-shadow:
        8px 0 0 #00FF41, 12px 0 0 #00FF41,
        4px 4px 0 #00FF41, 8px 4px 0 #00FF41, 12px 4px 0 #00FF41, 16px 4px 0 #00FF41,
        4px 8px 0 #00FF41, 8px 8px 0 #00FF41, 12px 8px 0 #00FF41, 16px 8px 0 #00FF41,
        8px 12px 0 #00FF41, 12px 12px 0 #00FF41,
        0px 16px 0 #00FF41, 4px 16px 0 #00FF41, 8px 16px 0 #00FF41, 12px 16px 0 #00FF41, 16px 16px 0 #00FF41, 20px 16px 0 #00FF41,
        0px 20px 0 #00FF41, 4px 20px 0 #00FF41, 8px 20px 0 #00FF41, 12px 20px 0 #00FF41, 16px 20px 0 #00FF41, 20px 20px 0 #00FF41,
        4px 24px 0 #00FF41, 8px 24px 0 #00FF41, 12px 24px 0 #00FF41, 16px 24px 0 #00FF41,
        -8px 20px 0 #00FF41, -4px 20px 0 #00FF41,
        24px 20px 0 #00FF41, 28px 20px 0 #00FF41, 32px 20px 0 #00FF41, 36px 20px 0 #00FF41, 40px 20px 0 #00FF41,
        4px 28px 0 #00FF41, 8px 28px 0 #00FF41,
        16px 28px 0 #00FF41, 20px 28px 0 #00FF41,
        4px 32px 0 #00FF41, 8px 32px 0 #00FF41,
        16px 32px 0 #00FF41, 20px 32px 0 #00FF41,
        4px 36px 0 #00FF41, 20px 36px 0 #00FF41;
      }
      50% { box-shadow:
        8px 0 0 #00FF41, 12px 0 0 #00FF41,
        4px 4px 0 #00FF41, 8px 4px 0 #00FF41, 12px 4px 0 #00FF41, 16px 4px 0 #00FF41,
        4px 8px 0 #00FF41, 8px 8px 0 #00FF41, 12px 8px 0 #00FF41, 16px 8px 0 #00FF41,
        8px 12px 0 #00FF41, 12px 12px 0 #00FF41,
        -4px 16px 0 #00FF41, 0px 16px 0 #00FF41, 4px 16px 0 #00FF41, 8px 16px 0 #00FF41, 12px 16px 0 #00FF41, 16px 16px 0 #00FF41,
        -4px 20px 0 #00FF41, 0px 20px 0 #00FF41, 4px 20px 0 #00FF41, 8px 20px 0 #00FF41, 12px 20px 0 #00FF41, 16px 20px 0 #00FF41,
        0px 24px 0 #00FF41, 4px 24px 0 #00FF41, 8px 24px 0 #00FF41, 12px 24px 0 #00FF41,
        20px 12px 0 #00FF41, 24px 12px 0 #00FF41, 28px 12px 0 #00FF41, 32px 12px 0 #00FF41, 36px 12px 0 #00FF41, 40px 12px 0 #00FF41, 44px 12px 0 #00FF41,
        4px 28px 0 #00FF41, 8px 28px 0 #00FF41,
        16px 28px 0 #00FF41, 20px 28px 0 #00FF41,
        4px 32px 0 #00FF41, 8px 32px 0 #00FF41,
        16px 32px 0 #00FF41, 20px 32px 0 #00FF41,
        4px 36px 0 #00FF41, 20px 36px 0 #00FF41;
      }
    }

    /* Kick 踢腿 */
    .pixel-fighter.kick {
      animation: kick-anim 0.5s steps(1) infinite;
    }

    @keyframes kick-anim {
      0%, 100% { box-shadow:
        8px 0 0 #00FF41, 12px 0 0 #00FF41,
        4px 4px 0 #00FF41, 8px 4px 0 #00FF41, 12px 4px 0 #00FF41, 16px 4px 0 #00FF41,
        4px 8px 0 #00FF41, 8px 8px 0 #00FF41, 12px 8px 0 #00FF41, 16px 8px 0 #00FF41,
        8px 12px 0 #00FF41, 12px 12px 0 #00FF41,
        0px 16px 0 #00FF41, 4px 16px 0 #00FF41, 8px 16px 0 #00FF41, 12px 16px 0 #00FF41, 16px 16px 0 #00FF41, 20px 16px 0 #00FF41,
        0px 20px 0 #00FF41, 4px 20px 0 #00FF41, 8px 20px 0 #00FF41, 12px 20px 0 #00FF41, 16px 20px 0 #00FF41, 20px 20px 0 #00FF41,
        4px 24px 0 #00FF41, 8px 24px 0 #00FF41, 12px 24px 0 #00FF41, 16px 24px 0 #00FF41,
        -8px 20px 0 #00FF41, -4px 20px 0 #00FF41,
        24px 20px 0 #00FF41, 28px 20px 0 #00FF41,
        4px 28px 0 #00FF41, 8px 28px 0 #00FF41,
        16px 28px 0 #00FF41, 20px 28px 0 #00FF41,
        4px 32px 0 #00FF41, 8px 32px 0 #00FF41,
        16px 32px 0 #00FF41, 20px 32px 0 #00FF41,
        4px 36px 0 #00FF41, 20px 36px 0 #00FF41;
      }
      50% { box-shadow:
        8px 0 0 #00FF41, 12px 0 0 #00FF41,
        4px 4px 0 #00FF41, 8px 4px 0 #00FF41, 12px 4px 0 #00FF41, 16px 4px 0 #00FF41,
        4px 8px 0 #00FF41, 8px 8px 0 #00FF41, 12px 8px 0 #00FF41, 16px 8px 0 #00FF41,
        8px 12px 0 #00FF41, 12px 12px 0 #00FF41,
        0px 16px 0 #00FF41, 4px 16px 0 #00FF41, 8px 16px 0 #00FF41, 12px 16px 0 #00FF41, 16px 16px 0 #00FF41, 20px 16px 0 #00FF41,
        0px 20px 0 #00FF41, 4px 20px 0 #00FF41, 8px 20px 0 #00FF41, 12px 20px 0 #00FF41, 16px 20px 0 #00FF41, 20px 20px 0 #00FF41,
        4px 24px 0 #00FF41, 8px 24px 0 #00FF41, 12px 24px 0 #00FF41, 16px 24px 0 #00FF41,
        -4px 16px 0 #00FF41, 0px 16px 0 #00FF41,
        24px 16px 0 #00FF41, 28px 16px 0 #00FF41,
        4px 28px 0 #00FF41, 8px 28px 0 #00FF41,
        24px 28px 0 #00FF41, 28px 28px 0 #00FF41, 32px 28px 0 #00FF41, 36px 28px 0 #00FF41, 40px 28px 0 #00FF41,
        4px 32px 0 #00FF41,
        36px 32px 0 #00FF41, 40px 32px 0 #00FF41,
        4px 36px 0 #00FF41,
        40px 36px 0 #00FF41;
      }
    }

    /* Stance 架势 */
    .pixel-fighter.stance {
      animation: stance-anim 0.6s steps(1) infinite;
      transform: translateX(-10px);
    }

    @keyframes stance-anim {
      0%, 100% { box-shadow:
        4px 0 0 #00FF41, 8px 0 0 #00FF41,
        0px 4px 0 #00FF41, 4px 4px 0 #00FF41, 8px 4px 0 #00FF41, 12px 4px 0 #00FF41,
        0px 8px 0 #00FF41, 4px 8px 0 #00FF41, 8px 8px 0 #00FF41, 12px 8px 0 #00FF41,
        4px 12px 0 #00FF41, 8px 12px 0 #00FF41,
        -4px 16px 0 #00FF41, 0px 16px 0 #00FF41, 4px 16px 0 #00FF41, 8px 16px 0 #00FF41, 12px 16px 0 #00FF41, 16px 16px 0 #00FF41,
        -4px 20px 0 #00FF41, 0px 20px 0 #00FF41, 4px 20px 0 #00FF41, 8px 20px 0 #00FF41, 12px 20px 0 #00FF41, 16px 20px 0 #00FF41,
        0px 24px 0 #00FF41, 4px 24px 0 #00FF41, 8px 24px 0 #00FF41, 12px 24px 0 #00FF41,
        -12px 16px 0 #00FF41, -8px 16px 0 #00FF41, -8px 12px 0 #00FF41, -4px 12px 0 #00FF41,
        20px 16px 0 #00FF41, 24px 16px 0 #00FF41,
        0px 28px 0 #00FF41, 4px 28px 0 #00FF41,
        12px 28px 0 #00FF41, 16px 28px 0 #00FF41,
        -4px 32px 0 #00FF41, 0px 32px 0 #00FF41,
        16px 32px 0 #00FF41, 20px 32px 0 #00FF41,
        -4px 36px 0 #00FF41, 20px 36px 0 #00FF41;
      }
      50% { box-shadow:
        4px 0 0 #00FF41, 8px 0 0 #00FF41,
        0px 4px 0 #00FF41, 4px 4px 0 #00FF41, 8px 4px 0 #00FF41, 12px 4px 0 #00FF41,
        0px 8px 0 #00FF41, 4px 8px 0 #00FF41, 8px 8px 0 #00FF41, 12px 8px 0 #00FF41,
        4px 12px 0 #00FF41, 8px 12px 0 #00FF41,
        -4px 16px 0 #00FF41, 0px 16px 0 #00FF41, 4px 16px 0 #00FF41, 8px 16px 0 #00FF41, 12px 16px 0 #00FF41, 16px 16px 0 #00FF41,
        -4px 20px 0 #00FF41, 0px 20px 0 #00FF41, 4px 20px 0 #00FF41, 8px 20px 0 #00FF41, 12px 20px 0 #00FF41, 16px 20px 0 #00FF41,
        0px 24px 0 #00FF41, 4px 24px 0 #00FF41, 8px 24px 0 #00FF41, 12px 24px 0 #00FF41,
        -16px 12px 0 #00FF41, -12px 12px 0 #00FF41, -12px 8px 0 #00FF41, -8px 8px 0 #00FF41,
        20px 16px 0 #00FF41, 24px 16px 0 #00FF41,
        0px 28px 0 #00FF41, 4px 28px 0 #00FF41,
        12px 28px 0 #00FF41, 16px 28px 0 #00FF41,
        -4px 32px 0 #00FF41, 0px 32px 0 #00FF41,
        16px 32px 0 #00FF41, 20px 32px 0 #00FF41,
        -4px 36px 0 #00FF41, 20px 36px 0 #00FF41;
      }
    }

    /* Victory 胜利 */
    .pixel-fighter.victory {
      animation: victory-anim 0.8s steps(1) infinite;
    }

    @keyframes victory-anim {
      0%, 100% { box-shadow:
        8px -8px 0 #FBBF24, 12px -8px 0 #FBBF24,
        4px -4px 0 #FBBF24, 8px -4px 0 #FBBF24, 12px -4px 0 #FBBF24, 16px -4px 0 #FBBF24,
        4px 0px 0 #00FF41, 8px 0px 0 #00FF41, 12px 0px 0 #00FF41, 16px 0px 0 #00FF41,
        8px 4px 0 #00FF41, 12px 4px 0 #00FF41,
        0px 8px 0 #00FF41, 4px 8px 0 #00FF41, 8px 8px 0 #00FF41, 12px 8px 0 #00FF41, 16px 8px 0 #00FF41, 20px 8px 0 #00FF41,
        -16px 0px 0 #00FF41, -12px 0px 0 #00FF41,
        28px 0px 0 #00FF41, 32px 0px 0 #00FF41,
        4px 12px 0 #00FF41, 8px 12px 0 #00FF41, 12px 12px 0 #00FF41, 16px 12px 0 #00FF41,
        4px 16px 0 #00FF41, 8px 16px 0 #00FF41,
        16px 16px 0 #00FF41, 20px 16px 0 #00FF41,
        4px 20px 0 #00FF41, 8px 20px 0 #00FF41,
        16px 20px 0 #00FF41, 20px 20px 0 #00FF41,
        4px 24px 0 #00FF41, 20px 24px 0 #00FF41;
      filter: drop-shadow(0 0 10px #FBBF24);
      }
      50% { box-shadow:
        8px -12px 0 #FBBF24, 12px -12px 0 #FBBF24,
        4px -8px 0 #FBBF24, 8px -8px 0 #FBBF24, 12px -8px 0 #FBBF24, 16px -8px 0 #FBBF24,
        4px -4px 0 #00FF41, 8px -4px 0 #00FF41, 12px -4px 0 #00FF41, 16px -4px 0 #00FF41,
        8px 0px 0 #00FF41, 12px 0px 0 #00FF41,
        0px 4px 0 #00FF41, 4px 4px 0 #00FF41, 8px 4px 0 #00FF41, 12px 4px 0 #00FF41, 16px 4px 0 #00FF41, 20px 4px 0 #00FF41,
        -20px -4px 0 #00FF41, -16px -4px 0 #00FF41,
        32px -4px 0 #00FF41, 36px -4px 0 #00FF41,
        4px 8px 0 #00FF41, 8px 8px 0 #00FF41, 12px 8px 0 #00FF41, 16px 8px 0 #00FF41,
        4px 12px 0 #00FF41, 8px 12px 0 #00FF41,
        16px 12px 0 #00FF41, 20px 12px 0 #00FF41,
        4px 16px 0 #00FF41, 8px 16px 0 #00FF41,
        16px 16px 0 #00FF41, 20px 16px 0 #00FF41,
        4px 20px 0 #00FF41, 20px 20px 0 #00FF41;
      filter: drop-shadow(0 0 15px #FBBF24);
      }
    }

    /* Controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 15px;
    }

    .btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid #00FF41;
      color: #00FF41;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .btn:hover { background: rgba(0, 255, 65, 0.2); }
    .btn.active {
      background: #00FF41;
      color: #000;
    }

    .features {
      max-width: 400px;
      font-size: 0.7rem;
      color: #888;
      line-height: 1.6;
    }

    .features h3 {
      color: #00FF41;
      margin: 15px 0 8px;
      font-size: 0.8rem;
    }

    .features ul { padding-left: 20px; }
    .features li { margin: 3px 0; }
    .features .pro { color: #4ADE80; }
    .features .con { color: #F87171; }
  </style>
</head>
<body>
  <h1>素材风格 C: Kung Fu Man NES <span class="badge">CC0 公共领域</span></h1>
  <div class="source-info">
    原始素材: <a href="https://opengameart.org/content/rpg-asset-character-kung-fu-man-gameboy" target="_blank">OpenGameArt Kung Fu Man NES</a><br>
    授权: CC0 (公共领域) - 无需署名，可直接商用 | 实现方式: CSS box-shadow
  </div>

  <div class="demo-container">
    <div id="fighter" class="pixel-fighter idle-f1"></div>
  </div>

  <div class="controls">
    <button class="btn active" data-action="idle-f1">Idle 待机</button>
    <button class="btn" data-action="punch">Punch 出拳</button>
    <button class="btn" data-action="kick">Kick 踢腿</button>
    <button class="btn" data-action="stance">Stance 架势</button>
    <button class="btn" data-action="victory">Victory 胜利</button>
  </div>

  <div class="features">
    <h3>技术特点</h3>
    <ul>
      <li class="pro">✓ 零图片资源，纯CSS</li>
      <li class="pro">✓ 极小包体积 (&lt;2KB)</li>
      <li class="pro">✓ 真正的像素风格</li>
      <li class="pro">✓ CC0授权，可商用</li>
      <li class="pro">✓ CSS变量可改色</li>
      <li class="con">✗ 复杂动画帧切换困难</li>
      <li class="con">✗ box-shadow数量多时性能下降</li>
    </ul>

    <h3>适用场景</h3>
    <ul>
      <li>简单复古像素风格</li>
      <li>需要极致轻量化</li>
      <li>无需外部资源的场景</li>
    </ul>
  </div>

  <script>
    const fighter = document.getElementById('fighter');

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fighter.className = 'pixel-fighter ' + btn.dataset.action;
      });
    });
  </script>
</body>
</html>

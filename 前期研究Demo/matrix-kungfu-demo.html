<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>Matrix Kung Fu - SoulBuilder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    #matrix-canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .foreground {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .center-box {
      background: rgba(0, 0, 0, 0.9);
      border: 3px solid #00FF41;
      padding: 32px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(0, 255, 65, 0.5);
    }

    .title {
      color: #00FF41;
      font-size: 2.5rem;
      text-shadow: 0 0 20px #00FF41, 0 0 40px #00FF41;
      margin-bottom: 0;
      letter-spacing: 8px;
      animation: title-glow 2s ease-in-out infinite;
    }

    @keyframes title-glow {
      0%, 100% { text-shadow: 0 0 20px #00FF41, 0 0 40px #00FF41; }
      50% { text-shadow: 0 0 30px #00FF41, 0 0 60px #00FF41, 0 0 80px #00FF41; }
    }

    .subtitle {
      display: none;
    }

    .countdown {
      color: #00FF41;
      font-size: 1.35rem;
      margin-top: 10px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00FF41;
      letter-spacing: 2px;
      text-align: center;
    }

    .countdown span {
      color: #FFF;
      font-weight: bold;
      font-size: 1.65rem;
    }

    .fighter-stage {
      position: relative;
      width: 300px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-50px);
    }

    .ground-reflection {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 250px;
      height: 60px;
      background: radial-gradient(ellipse at center, rgba(0, 255, 65, 0.4) 0%, transparent 70%);
      filter: blur(15px);
    }

    .pixel-fighter {
      width: 20px;
      height: 20px;
      background: #00FF41;
      position: relative;
      filter: drop-shadow(0 0 25px #00FF41);
      transform-origin: center center;
      transform: scale(0.5);
      margin-left: -100px;
    }

    /* 隐藏控制按钮 */
    .controls { display: none !important; }
    .status { display: none !important; }

    /* Idle */

      animation: fighter-idle 0.6s steps(1) infinite;
    }

<body>
  <canvas id="matrix-canvas"></canvas>

  <!-- 开始确认弹窗 -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-dialog">
      <h2>🥋 准备开始训练</h2>
      <p>用30秒走完人类3-10年的成长之路</p>
      <button class="start-btn" id="startBtn">开始修炼</button>
    </div>
  </div>

  <div class="foreground">
    <div class="center-box">
      <h1 class="title">员工段位快速升级中</h1>
      <div class="countdown" id="countdown">SoloBrave，最勇敢的人就是一支完整队伍<br>本次训练还需要 <span id="timer">30</span> 秒</div>

      <div class="fighter-stage">
        <div class="ground-reflection"></div>
        <div id="fighter" class="pixel-fighter idle"></div>
      </div>
    </div>
  </div>

  <div class="credits">
    Pixel Art: <a href="https://opengameart.org/content/rpg-asset-character-kung-fu-man-gameboy" target="_blank">Kung Fu Man NES</a> (CC0)
  </div>

  <script>
    // ========== 音效系统 (Web Audio API) ==========
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    let audioInitialized = false;

    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new AudioContext();
      }
      // 确保 AudioContext 处于运行状态
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    // 初始化音频（需要用户交互）
    function initAudio() {
      if (audioInitialized) return;
      getAudioContext();
      audioInitialized = true;
      // 隐藏提示
      const hint = document.getElementById('audioHint');
      if (hint) hint.classList.add('active');
      console.log('Audio initialized');
    }

    // 小招音效 - 挥拳风声
    function playSmallSound() {
      const ctx = getAudioContext();
      const bufferSize = ctx.sampleRate * 0.15;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(3000, ctx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.15);
      filter.Q.value = 2;
      const gain = ctx.createGain();
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      noise.start();
      noise.stop(ctx.currentTime + 0.15);
    }

    // 中招音效 - 踢腿
    function playMediumSound() {
      const ctx = getAudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.35, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      osc.start();
      osc.stop(ctx.currentTime + 0.15);

      // 高频点击
      const click = ctx.createOscillator();
      const clickGain = ctx.createGain();
      click.type = 'square';
      click.connect(clickGain);
      clickGain.connect(ctx.destination);
      click.frequency.setValueAtTime(1000, ctx.currentTime);
      click.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.05);
      clickGain.gain.setValueAtTime(0.12, ctx.currentTime);
      clickGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
      click.start();
      click.stop(ctx.currentTime + 0.05);
    }

    // 大招音效 - 觉醒
    function playBigSound() {
      const ctx = getAudioContext();
      // 能量汇聚
      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.type = 'sine';
      osc1.connect(gain1);
      gain1.connect(ctx.destination);
      osc1.frequency.setValueAtTime(100, ctx.currentTime);
      osc1.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.8);
      gain1.gain.setValueAtTime(0.08, ctx.currentTime);
      gain1.gain.linearRampToValueAtTime(0.25, ctx.currentTime + 0.6);
      gain1.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.9);
      osc1.start();
      osc1.stop(ctx.currentTime + 0.9);

      // 泛音层
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'triangle';
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.frequency.setValueAtTime(200, ctx.currentTime);
      osc2.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.8);
      gain2.gain.setValueAtTime(0.04, ctx.currentTime);
      gain2.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.6);
      gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.9);
      osc2.start();
      osc2.stop(ctx.currentTime + 0.9);

      // 爆发
      setTimeout(() => {
        const bufferSize = ctx.sampleRate * 0.5;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1500;
        filter.Q.value = 2;
        const gain = ctx.createGain();
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        noise.start();
        noise.stop(ctx.currentTime + 0.5);

        // 高频闪光音
        const spark = ctx.createOscillator();
        const sparkGain = ctx.createGain();
        spark.type = 'sine';
        spark.connect(sparkGain);
        sparkGain.connect(ctx.destination);
        spark.frequency.setValueAtTime(2000, ctx.currentTime);
        spark.frequency.exponentialRampToValueAtTime(5000, ctx.currentTime + 0.1);
        spark.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.3);
        sparkGain.gain.setValueAtTime(0.12, ctx.currentTime);
        sparkGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        spark.start();
        spark.stop(ctx.currentTime + 0.3);
      }, 800);
    }

    // 根据动作播放音效
    function playSoundForAction(action) {
      if (!audioInitialized) return; // 音频未激活时不播放
      try {
        switch(action) {
          case 'punch':
            playSmallSound();
            break;
          case 'kick':
            playMediumSound();
            break;
          case 'training':
            // training 随机播放小招或中招
            Math.random() > 0.5 ? playSmallSound() : playMediumSound();
            break;
          case 'awakening':
            playBigSound();
            break;
        }
      } catch(e) {
        console.error('Sound error:', e);
      }
    }

        countdown--;

          timerEl.textContent = countdown;
        } else {
          clearInterval(countdownInterval);
          countdownEl.innerHTML = 'SoloBrave，最勇敢的人就是一支完整队伍<br>训练完成！';

          countdownEl.style.textShadow = '0 0 20px #FBBF24';
        }
      }, 1000);
    }

    // 获取金句中白色字符的位置
    function getWhiteIndices(quote, keyword) {
      const indices = new Set();
      const startIdx = quote.indexOf(keyword);
      if (startIdx !== -1) {
        for (let i = 0; i < keyword.length; i++) {
          indices.add(startIdx + i);
        }
      }
      return indices;
    }

    const fontSize = 27;
    let columns = Math.floor(canvas.width / fontSize * 0.7); // 列数减少30%
    let drops = [];

    for (let i = 0; i < columns; i++) {
      drops.push(Math.floor(Math.random() * -50)); // 随机起始位置，错落有致
    }

    // 每列对应一个金句
    const columnQuotes = [];

    function initColumnQuotes() {
      columnQuotes.length = 0;
      for (let i = 0; i < columns; i++) {
        columnQuotes.push(quotes[Math.floor(Math.random() * quotes.length)]);
      }
    }

    initColumnQuotes();

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const currentQuote = columnQuotes[i];
        // 不用取模，让金句只显示一遍
        const charIndex = Math.floor(drops[i]) - 1;

        const x = i * fontSize * 1.82; // 列间距再增加30%
        const y = drops[i] * fontSize * 1.5; // 行间距增加50%

        // 只有当 charIndex 在金句范围内才显示
        if (charIndex >= 0 && charIndex < currentQuote.length) {
          const char = currentQuote[charIndex];
          const quoteIndex = quotes.indexOf(currentQuote);
          const keyword = whiteWords[quoteIndex];
          const whiteIndices = getWhiteIndices(currentQuote, keyword);

          // 判断当前字符是否在关键词位置
          if (whiteIndices.has(charIndex)) {
            ctx.fillStyle = '#FFF';
          } else {
            ctx.fillStyle = '#00FF41';
          }
          ctx.fillText(char, x, y);
        }

        // 当金句完全离开屏幕后，重置并换新金句
        // drops[i] - 1 > currentQuote.length 表示金句已全部显示完
        // y > canvas.height 表示已离开屏幕底部
        if ((drops[i] - 1) > currentQuote.length && y > canvas.height) {
          drops[i] = 0;
          columnQuotes[i] = quotes[Math.floor(Math.random() * quotes.length)];
        }
        drops[i]++;
      }
    }

    let matrixInterval = null;

    function startMatrix() {
      if (matrixInterval) return;
      matrixInterval = setInterval(drawMatrix, 75);
    }

    window.addEventListener('resize', () => {
      columns = Math.floor(canvas.width / fontSize * 0.7); // 列数减少30%
      drops = [];
      for (let i = 0; i < columns; i++) {
        drops.push(Math.floor(Math.random() * -50)); // 随机起始位置
      }
      initColumnQuotes();
    });

    // ========== 自动循环动作（随机序列）==========
    const fighter = document.getElementById('fighter');
    const basicActions = ['idle', 'punch', 'kick', 'training'];
    const specialAction = 'awakening';

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // 生成随机动作序列
    function generateSequence() {
      const sequence = [];
      // 随机 5-10 个基础动作
      const length = Math.floor(Math.random() * 6) + 5;

      for (let i = 0; i < length; i++) {
        const action = basicActions[Math.floor(Math.random() * basicActions.length)];
        const duration = Math.floor(Math.random() * 400) + 300; // 300-700ms
        sequence.push({ action, duration });
      }

      // 大招
      sequence.push({ action: specialAction, duration: 1500 });

      // 喘口气
      sequence.push({ action: 'idle', duration: Math.floor(Math.random() * 500) + 500 });

      return sequence;
    }

    // 播放动作序列
    async function playSequence() {
      const sequence = generateSequence();

      for (const item of sequence) {
        fighter.className = 'pixel-fighter ' + item.action;
        // 播放对应音效
        playSoundForAction(item.action);
        await sleep(item.duration);
      }

      // 循环
      playSequence();
    }

    // ========== 开始按钮 ==========
    const startOverlay = document.getElementById('startOverlay');
    const startBtn = document.getElementById('startBtn');

    startBtn.addEventListener('click', () => {
      // 隐藏开始弹窗
      startOverlay.classList.add('hidden');

      // 初始化音频
      initAudio();

      // 启动所有动画
      startMatrix();
      startCountdown();
      playSequence();
    });
